# Flake8 settings
[flake8]
max-line-length = 100
max-complexity = 15
# Ignore E203 (whitespace before ':') and W503 (line break before operator) 
# because they sometimes conflicts with Black and aren't PEP8 compliant
ignore = E203, W503
exclude = venv, vir, dist, build, .venv
per-file-ignores = 
    # Ignore unused imports and redeclarations in tests so we can use pytest fixtures
    hayapp_python/tests/*.py: F811, F401

# MyPy settings
[mypy]
python_version = 3.11
exclude = venv, vir, dist, build, .venv
# Don't warn about imports that can't be resolved
ignore_missing_imports = True

# iSort settings
[isort]
profile = black

[tool:pytest]
pythonpath = hayapp_python
