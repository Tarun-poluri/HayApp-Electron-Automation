name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json
        id: bump
        working-directory: magvation-hayapp-ui
        shell: bash
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.version_type }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Commit and push version bump
        shell: bash
        run: |
          git add magvation-hayapp-ui/package.json magvation-hayapp-ui/package-lock.json
          git commit -m "Bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main

      - name: Create and push version tag
        shell: bash
        run: |
          git tag ${{ steps.bump.outputs.version }}
          git push origin ${{ steps.bump.outputs.version }}
          echo "Tagged and pushed ${{ steps.bump.outputs.version }} — build.yml will now publish to HayApp-Releases"
