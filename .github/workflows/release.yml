name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: magvation-hayapp-ui/package-lock.json

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "Tarun-poluri"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Tarun-poluri/HayApp-Electron-Automation.git

      - name: Bump version in package.json
        id: bump
        working-directory: magvation-hayapp-ui
        shell: bash
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.version_type }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Commit and push version bump
        shell: bash
        run: |
          git add magvation-hayapp-ui/package.json magvation-hayapp-ui/package-lock.json
          git commit -m "Bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Install frontend dependencies
        working-directory: magvation-hayapp-ui
        run: npm ci

      - name: Build parlay.js local package
        working-directory: magvation-hayapp-ui/parlay.js
        run: |
          npm install
          npm run build

      - name: Build Python backend (HayAppBroker)
        working-directory: hayapp_backend
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m venv venv
          .\venv\Scripts\python -m pip install --upgrade pip --quiet
          .\venv\Scripts\pip install -e parlay_vendor --quiet
          .\venv\Scripts\pip install -r requirements-ci.txt
          if ($LASTEXITCODE -ne 0) { throw "pip install failed" }
          .\venv\Scripts\pip install pyinstaller==6.18.0 --quiet
          .\venv\Scripts\python -m scripts.create_version_meta

          # Build pyinstaller command — parlay config.json is optional
          $parlayConfig = "venv\Lib\site-packages\parlay\server\config.json"
          $addDataArg = if (Test-Path $parlayConfig) {
            "--add-data `"$parlayConfig;parlay\server`""
          } else { "" }

          $cmd = ".\venv\Scripts\pyinstaller --onedir --noconfirm --clean " +
                 "--collect-all autobahn --hidden-import=twisted.internet.utils " +
                 "$addDataArg --name HayAppBroker " +
                 "--version-file version_meta.txt --icon hayapp.ico " +
                 "hayapp_python\hayapp_broker.py"
          Invoke-Expression $cmd
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller failed" }

          # Verify HayAppBroker.exe was produced
          if (-not (Test-Path "dist\HayAppBroker\HayAppBroker.exe")) {
            throw "HayAppBroker.exe was not produced by PyInstaller"
          }
          Write-Host "HayAppBroker.exe built successfully"

          # Move HayAppBroker folder contents up to dist/
          robocopy dist\HayAppBroker dist /E /MOVE /R:2 /W:5
          if ($LASTEXITCODE -ge 8) { throw "robocopy move failed: $LASTEXITCODE" }
          $global:LASTEXITCODE = 0

          # Copy additional asset folders
          robocopy needle_detector dist\needle_detector /E /R:2 /W:5
          if ($LASTEXITCODE -ge 8) { throw "robocopy needle_detector failed: $LASTEXITCODE" }
          $global:LASTEXITCODE = 0
          robocopy image_decoder dist\image_decoder /E /R:2 /W:5
          if ($LASTEXITCODE -ge 8) { throw "robocopy image_decoder failed: $LASTEXITCODE" }
          $global:LASTEXITCODE = 0
          if (Test-Path local_user_data) {
            robocopy local_user_data dist\local_user_data /E /R:2 /W:5
            if ($LASTEXITCODE -ge 8) { throw "robocopy local_user_data failed" }
            $global:LASTEXITCODE = 0
          }
          if (Test-Path ParlayUI) {
            robocopy ParlayUI dist\ParlayUI /E /R:2 /W:5
            if ($LASTEXITCODE -ge 8) { throw "robocopy ParlayUI failed" }
            $global:LASTEXITCODE = 0
          }
          if (Test-Path stm32flash) {
            robocopy stm32flash dist\stm32flash /E /R:2 /W:5
            if ($LASTEXITCODE -ge 8) { throw "robocopy stm32flash failed" }
            $global:LASTEXITCODE = 0
          }
          $vir = Get-ChildItem -Path 'vir' -Filter '*.zip' | Sort-Object Name | Select-Object -Last 1
          if ($vir) {
            New-Item -ItemType Directory -Path 'dist\vir' -Force | Out-Null
            Expand-Archive -Path $vir.FullName -DestinationPath 'dist\vir' -Force
          }
          Write-Host "Backend build complete. dist/ contents:"
          Get-ChildItem dist | Select-Object Name

      - name: Copy backend into broker folder for Electron bundling
        shell: pwsh
        run: |
          Copy-Item -Path "hayapp_backend\dist" -Destination "magvation-hayapp-ui\broker" -Recurse -Force
          Write-Host "broker/ folder ready:"
          Get-ChildItem "magvation-hayapp-ui\broker" | Select-Object Name

      - name: Build and publish to HayApp-Releases
        working-directory: magvation-hayapp-ui
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: npm run publish

      - name: Create and push version tag
        shell: bash
        run: |
          git tag ${{ steps.bump.outputs.version }}
          git push origin ${{ steps.bump.outputs.version }}
          echo "Released ${{ steps.bump.outputs.version }} successfully"
