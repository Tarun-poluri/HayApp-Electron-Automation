name: Build Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: magvation-hayapp-ui/package-lock.json

      - name: Show environment
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: magvation-hayapp-ui
        run: npm ci

      - name: Build parlay.js local package
        working-directory: magvation-hayapp-ui/parlay.js
        run: |
          npm install
          npm run build

      - name: Build installer (branch push — for testing)
        if: "!startsWith(github.ref, 'refs/tags/')"
        working-directory: magvation-hayapp-ui
        run: npm run make

      - name: Publish to GitHub Releases (version tag)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: magvation-hayapp-ui
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: npm run publish

      - name: List build output
        if: always()
        shell: pwsh
        working-directory: magvation-hayapp-ui
        run: |
          if (Test-Path out) {
            Get-ChildItem -Recurse out | Select-Object FullName
          } else {
            Write-Host "No out/ directory — build did not produce output"
          }

      - name: Upload artifact (branch push only)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: HayApp-Windows-Installer
          path: magvation-hayapp-ui/out/make/squirrel.windows/x64/
          retention-days: 14
          if-no-files-found: error
